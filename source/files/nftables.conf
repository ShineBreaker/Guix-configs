flush ruleset
table inet filter {
    chain input {
        type filter hook input priority filter; policy drop;

        # accept established/related connections
        ct state { established, related } accept

        # accept loopback traffic
        iifname "lo" accept

        # allow dhcp on virbr0
        iifname "virbr0" udp dport 67 counter accept

        # allow dns on virbr0
        iifname "virbr0" meta l4proto { tcp, udp } th dport 53 accept

        # allow all traffic from hotspot interface
        iifname "wlp0s20f3" accept

        # HTTP 调试端口（仅可信接口）
        iifname { "wlp0s20f3", "virbr0" } tcp dport { 8000, 8080 } accept

        # Proxmox VNC Web Interface（仅可信接口）
        iifname "wlp0s20f3" tcp dport 8006 accept
        iifname "wlp0s20f3" udp dport 8006 accept

        # Remote Desktop Protocol (RDP)（仅可信接口）
        iifname "wlp0s20f3" tcp dport 3389 accept
        iifname "wlp0s20f3" udp dport 3389 accept

        # uudesk（仅可信接口）
        iifname "wlp0s20f3" tcp dport 16363 accept
        iifname "wlp0s20f3" udp dport 16363 accept

        # Sunshine（仅热点接口）
        iifname "wlp0s20f3" tcp dport 47989 accept
        iifname "wlp0s20f3" udp dport 47984-48010 accept

        # Syncthing 同步端口（仅可信接口）
        iifname "wlp0s20f3" tcp dport 22000 accept

        # Syncthing 本地发现（仅热点接口）
        iifname "wlp0s20f3" udp dport 21027 accept

        # KDE Connect TCP（仅热点接口）
        iifname "wlp0s20f3" tcp dport 1714-1764 accept

        # KDE Connect UDP（仅热点接口）
        iifname "wlp0s20f3" udp dport 1714-1764 accept

        # Tailscale WireGuard 直连端口
        udp dport 41641 accept

        # Tailscale userspace-networking: no kernel tailscale0 interface

        # reject everything else
        reject with icmpx type port-unreachable
    }

    chain forward {
        type filter hook forward priority filter; policy drop;

        # allow outbound traffic from virbr0
        iifname "virbr0" accept

        # allow established traffic to virbr0
        oifname "virbr0" ct state { established, related } accept

        # allow outbound traffic from hotspot (wlp0s20f3)
        iifname "wlp0s20f3" accept

        # allow established traffic to hotspot
        oifname "wlp0s20f3" ct state { established, related } accept
    }

    chain output {
        type filter hook output priority 0; policy accept;
    }
}

table inet nat {
    chain postrouting {
        type nat hook postrouting priority srcnat; policy accept;

        # don't masquerade to reserved address blocks
        iifname "virbr0" ip daddr { 224.0.0.0/4, 255.255.255.255/32 } return

        # masquerade all outgoing traffic from VMs
        iifname "virbr0" oifname != "virbr0" masquerade

        # masquerade all outgoing traffic from hotspot
        iifname "wlp0s20f3" oifname != "wlp0s20f3" masquerade
    }
}
