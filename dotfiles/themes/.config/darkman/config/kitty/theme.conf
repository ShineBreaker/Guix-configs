# Base colors
background            $$base01$$
foreground            $$base07$$
cursor                $$base0C$$
selection_background  $$base03$$
selection_foreground  $$base07$$

# Tab bar colors (separate from background for visibility)
tab_bar_background      $$base02$$
active_tab_background   $$base03$$
active_tab_foreground   $$base03$$
inactive_tab_background $$base01$$
inactive_tab_foreground $$base04$$

# URL/link color
url_color             $$base0D$$

# ANSI colors (Base16 mapping)
# color0/7: grayscale (black to white)
color0                $$base07$$
color8                $$base04$$
color7                $$base00$$
color15               $$base00$$

# color1/9: red
color1                $$base0F$$
color9                $$base0F$$

# color2/10: green
color2                $$base0B$$
color10               $$base0B$$

# color3/11: yellow
color3                $$base0A$$
color11               $$base0A$$

# color4/12: blue
color4                $$base0D$$
color12               $$base0D$$

# color5/13: magenta/purple
color5                $$base0E$$
color13               $$base0E$$

# color6/14: cyan/teal
color6                $$base0C$$
color14               $$base0C$$
