[colors]
alpha=0.95

[cursor]
style=beam

[csd]
preferred=none

[main]
font=Maple Mono NF CN
shell=/run/current-system/profile/bin/fish
dpi-aware=yes
include=~/.config/foot/theme.ini
term=foot
selection-target=clipboard
pad=0x0

[mouse]
hide-when-typing=yes

[scrollback]
lines=50000
multiplier=3.0

[tweak]
grapheme-shaping=yes
