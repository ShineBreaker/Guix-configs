# ========== 基础设置 ==========
# 设置真彩色支持（针对 foot 优化）
set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",foot*:Tc:RGB"
set -ga terminal-overrides ",xterm-256color:Tc"
# foot 终端键码优化
set -ga terminal-overrides ",foot*:kUP5=\E[1;5A:kDN5=\E[1;5B:kLFT5=\E[1;5D:kRIT5=\E[1;5C"

# 前缀键保持 Ctrl+b
set -g prefix C-b
bind C-b send-prefix

# 窗口和窗格索引从 1 开始（更直观）
set -g base-index 1
setw -g pane-base-index 1

# 自动重新编号窗口
set -g renumber-windows on

# ========== 顶部上下文条 ==========
set -g status on
set -g status-position top
set -g status-justify left
set -g status-style bg=default,fg=brightwhite
set -g status-left-length 100
set -g status-right-length 80
set -g status-left '#[fg=brightgreen,bold]#S #[fg=brightblack]#I:#W #[fg=brightblue]#{pane_current_command} #[fg=white]#{b:pane_current_path}#{?client_prefix, #[fg=brightyellow,bold]PREFIX,}'
set -g status-right '#[fg=brightblack]#{client_width}x#{client_height} #[fg=brightyellow]%Y-%m-%d #[fg=brightwhite]%H:%M'

# 窗口标签由左侧侧栏承载，顶部上下文条不再显示标签列表。
set -g window-status-current-style bg=default,fg=default
set -g window-status-style fg=default,bg=default
set -g window-status-format ''
set -g window-status-current-format ''
set -g window-status-separator ''

# 窗格边框
set -g pane-border-style fg=brightblack
set -g pane-active-border-style fg=brightblue
set -g display-panes-time 1200

# ========== 键位绑定 ==========
# 重新加载配置
bind r source-file ~/.config/tmux/tmux.conf \; display "配置已重载！"

# 显示帮助文档
bind \? display-popup -E -w 70% -h 90% -b rounded \
  "printf '  === TMUX 基础操作 ===\n' && \
   printf '    Ctrl+b r       重新加载配置\n' && \
   printf '    Ctrl+b \?       显示此帮助\n\n' && \
   printf '  TMUX 窗格操作:\n' && \
   printf '    Alt+方向键     切换窗格\n' && \
   printf '    Alt+Shift+n    新建窗格\n' && \
   printf '    Alt+Shift+k    关闭当前窗格\n' && \
   printf '    Alt+Shift+1-0  按编号切换窗格\n' && \
   printf '    Alt+Ctrl+上下  移动当前窗格\n' && \
   printf '    Ctrl+方向键    调整窗格大小\n' && \
   printf '    Alt+Shift+r    进入窗格调整模式\n' && \
   printf '    Ctrl+b \\       垂直分屏\n' && \
   printf '    Ctrl+b -       水平分屏\n' && \
   printf '    Ctrl+b hjkl     vim风格切换窗格\n\n' && \
   printf '  TMUX 窗口操作:\n' && \
   printf '    Alt+1-5        快速切换窗口\n\n' && \
   printf '    Alt+Shift+c    新建窗口\n' && \
   printf '    Alt+Shift+x    关闭当前窗口\n' && \
   printf '    Alt+Shift+左右 切换窗口\n' && \
   printf '    Alt+Shift+l    切换布局\n' && \
   printf '    Alt+Shift+\\\\/-  tall/fat 布局\n\n' && \
   printf '  TMUX 关闭/退出:\n' && \
   printf '    Ctrl+b x       关闭当前窗格（确认）\n' && \
   printf '    Ctrl+b &       关闭当前窗口\n' && \
   printf '    Ctrl+b d       分离当前会话\n\n' && \
   printf '  TMUX 复制模式:\n' && \
   printf '    Ctrl+b [       进入复制模式\n' && \
   printf '    Alt+Shift+h    打开回滚\n' && \
   printf '    Alt+Shift+f    搜索回滚\n' && \
   printf '    v              开始选择\n' && \
   printf '    y              复制到剪贴板\n' && \
   printf '    Ctrl+b p       粘贴\n\n' && \
   printf '  TMUX 侧边栏:\n' && \
   printf '    Ctrl+b B       切换侧边栏\n' && \
   printf '    Ctrl+b f       模糊跳转窗口\n' && \
   printf '    Ctrl+b g       刷新 git 信息\n' && \
   printf '    Ctrl+b G       折叠/展开组\n' && \
   printf '    Ctrl+b i       窗口详情\n\n' && \
   printf '  === FOOT 终端快捷键 ===\n' && \
   printf '  搜索与URL:\n' && \
   printf '    Ctrl+Shift+r      开始回滚搜索\n' && \
   printf '    Ctrl+Shift+o      URL模式(键盘打开链接)\n' && \
   printf '  搜索模式快捷键:\n' && \
   printf '    Ctrl+r/s          向上/向下搜索\n' && \
   printf '    Ctrl+w            扩展到词尾\n' && \
   printf '    Ctrl+Shift+w      扩展到空白处\n' && \
   printf '    Enter             确认并复制到主选择\n' && \
   printf '    Esc/Ctrl+g        取消搜索\n\n' && \
   printf '  URL模式快捷键:\n' && \
   printf '    a-z字母           跳转到标记的URL\n' && \
   printf '    t                 切换URL显示/隐藏\n' && \
   printf '    Esc/Ctrl+g        退出URL模式\n\n' && \
   printf '  === 提示 ===\n' && \
   printf '  • 按 q 或 Esc 关闭此窗口\n' && \
   read -n 1"

# 分屏（保持当前路径）
bind \\ split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
unbind '"'
unbind %

# 使用 Alt+方向键切换窗格（无需前缀）
bind -n M-Left select-pane -L
bind -n M-Right select-pane -R
bind -n M-Up select-pane -U
bind -n M-Down select-pane -D

# 使用 Ctrl+方向键调整窗格大小（无需前缀）
bind -n C-Left resize-pane -L 2
bind -n C-Right resize-pane -R 2
bind -n C-Up resize-pane -U 2
bind -n C-Down resize-pane -D 2

# 使用 hjkl 切换窗格
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# 快速切换窗口
bind -n M-1 select-window -t 1
bind -n M-2 select-window -t 2
bind -n M-3 select-window -t 3
bind -n M-4 select-window -t 4
bind -n M-5 select-window -t 5

# ========== Kitty 风格快捷键迁移 ==========
# kitty window ≈ tmux pane；kitty tab ≈ tmux window。
bind -n M-N split-window -c "#{pane_current_path}"
bind -n M-K confirm-before -p "关闭当前窗格 #P? (y/n)" kill-pane
bind -n M-C new-window -c "#{pane_current_path}"
bind -n M-X confirm-before -p "关闭当前窗口 #W? (y/n)" kill-window

bind -n M-S-Right next-window
bind -n M-S-Left previous-window
bind -n M-S-Down select-pane -t :.+
bind -n M-S-Up select-pane -t :.-

bind -n C-M-Down swap-pane -D
bind -n C-M-Up swap-pane -U
bind -n M-Space swap-pane -t :.1

bind -n M-! select-pane -t 1
bind -n M-@ select-pane -t 2
bind -n M-# select-pane -t 3
bind -n M-$ select-pane -t 4
bind -n M-% select-pane -t 5
bind -n M-^ select-pane -t 6
bind -n M-& select-pane -t 7
bind -n M-* select-pane -t 8
bind -n M-( select-pane -t 9
bind -n M-) select-pane -t 10

bind -n M-L next-layout
bind -n M-| select-layout main-vertical
bind -n M-_ select-layout main-horizontal
bind -n M-R switch-client -T resize-pane
bind -T resize-pane Left resize-pane -L 4 \; switch-client -T resize-pane
bind -T resize-pane Right resize-pane -R 4 \; switch-client -T resize-pane
bind -T resize-pane Up resize-pane -U 2 \; switch-client -T resize-pane
bind -T resize-pane Down resize-pane -D 2 \; switch-client -T resize-pane
bind -T resize-pane h resize-pane -L 4 \; switch-client -T resize-pane
bind -T resize-pane l resize-pane -R 4 \; switch-client -T resize-pane
bind -T resize-pane k resize-pane -U 2 \; switch-client -T resize-pane
bind -T resize-pane j resize-pane -D 2 \; switch-client -T resize-pane
bind -T resize-pane Escape switch-client -T root
bind -T resize-pane q switch-client -T root

bind -n M-H copy-mode -u
bind -n M-F command-prompt -i -p "搜索回滚" "copy-mode \; send-keys -X search-backward '%%'"
bind -n M-/ command-prompt -p "tmux 命令" "%%"
bind -n S-Insert run "wl-paste --primary | tmux load-buffer - && tmux paste-buffer"

# ========== 鼠标支持 ==========
set -g mouse on
bind-key -T root MouseDown1Pane if-shell -F '#{==:#{pane_title},tmux-sidebar}' \
  'run-shell -b "GUILE_AUTO_COMPILE=0 guile --no-auto-compile -s ~/.config/tmux/scripts/sidebar-render.scm click #{mouse_y} #{pane_top} #{pane_id}"' \
  'select-pane -t =; send-keys -M; run-shell -b "~/.config/tmux/scripts/sidebar-toggle signal"'

# ========== 复制模式（Vi 风格 + Wayland） ==========
setw -g mode-keys vi

# 进入复制模式
bind [ copy-mode
bind Escape copy-mode
bind -T copy-mode-vi v send-keys -X begin-selection
bind -T copy-mode-vi y send-keys -X copy-pipe-and-cancel "wl-copy"
bind -T copy-mode-vi Enter send-keys -X copy-pipe-and-cancel "wl-copy"
bind -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-pipe-and-cancel "wl-copy"

# 粘贴
bind p run "wl-paste | tmux load-buffer - && tmux paste-buffer"

# ========== 性能优化 ==========
# 历史记录
set -g history-limit 50000

# 减少延迟
set -sg escape-time 0
set -g repeat-time 300

# 启用焦点事件
set -g focus-events on

# ========== 窗口管理 ==========
# 自动重命名窗口
setw -g automatic-rename on
set -g automatic-rename-format '#{b:pane_current_path}'

# 终端标题
set -g set-titles on
set -g set-titles-string '#S:#I:#W - tmux'

# 监控活动
setw -g monitor-activity on
set -g visual-activity off

# ========== 其他设置 ==========
# 允许使用系统剪贴板
set -s set-clipboard on

# 更长的消息显示时间
set -g display-time 2000

# ========== 侧边栏标签栏 ==========
# 配色（使用终端 ANSI 颜色，由 foot/darkman 驱动）
set -g @sidebar_width 32
set -g @sidebar_bg "default"
set -g @sidebar_fg "white"
set -g @sidebar_active_fg "brightblue"
set -g @sidebar_group_fg "brightcyan"
set -g @sidebar_activity_fg "brightyellow"

# 浮动窗格状态。该选项表达用户偏好；具体 pane id 按窗口保存。
set -g @sidebar_visible 1

# 状态栏间隔（用于活动检测轮询 + 数据刷新）
set -g status-interval 15

# 侧边栏 hooks（数据采集：窗格/布局变化时更新缓存）
set-hook -g after-select-pane 'run-shell -b "GUILE_AUTO_COMPILE=0 guile --no-auto-compile -s ~/.config/tmux/scripts/sidebar-render.scm data"'
set-hook -g after-split-window 'run-shell -b "GUILE_AUTO_COMPILE=0 guile --no-auto-compile -s ~/.config/tmux/scripts/sidebar-render.scm data; ~/.config/tmux/scripts/sidebar-toggle follow"'
set-hook -g after-kill-pane 'run-shell -b "GUILE_AUTO_COMPILE=0 guile --no-auto-compile -s ~/.config/tmux/scripts/sidebar-render.scm data; ~/.config/tmux/scripts/sidebar-toggle follow"'
set-hook -g after-select-layout 'run-shell -b "GUILE_AUTO_COMPILE=0 guile --no-auto-compile -s ~/.config/tmux/scripts/sidebar-render.scm data"'
set-hook -g after-resize-pane 'run-shell -b "GUILE_AUTO_COMPILE=0 guile --no-auto-compile -s ~/.config/tmux/scripts/sidebar-render.scm data; ~/.config/tmux/scripts/sidebar-toggle follow"'
set-hook -g after-new-window 'run-shell -b "GUILE_AUTO_COMPILE=0 guile --no-auto-compile -s ~/.config/tmux/scripts/sidebar-render.scm data; ~/.config/tmux/scripts/sidebar-toggle follow"'
set-hook -g window-unlinked 'run-shell -b "GUILE_AUTO_COMPILE=0 guile --no-auto-compile -s ~/.config/tmux/scripts/sidebar-render.scm data"'
# 侧边栏跟随：窗口/客户端变化时确保当前窗口有自己的侧栏。
set-hook -g after-select-window 'run-shell -b "~/.config/tmux/scripts/sidebar-toggle follow"'
set-hook -g client-attached 'run-shell -b "GUILE_AUTO_COMPILE=0 guile --no-auto-compile -s ~/.config/tmux/scripts/sidebar-render.scm data; ~/.config/tmux/scripts/sidebar-toggle follow"'
set-hook -g client-active 'run-shell -b "~/.config/tmux/scripts/sidebar-toggle follow"'
set-hook -g client-resized 'run-shell -b "~/.config/tmux/scripts/sidebar-toggle follow"'

# 侧边栏切换
bind B run-shell "~/.config/tmux/scripts/sidebar-toggle"

# 模糊窗口跳转
bind f display-popup -E -w 80% -h 60% -b rounded "~/.config/tmux/scripts/window-jump"

# 手动刷新 git 信息
bind g run-shell "GUILE_AUTO_COMPILE=0 guile --no-auto-compile -s ~/.config/tmux/scripts/sidebar-render.scm git" \; display-message "git 信息已刷新"

# 窗口详情弹窗
bind i display-popup -E -w 60% -h 40% -b rounded \
  "tmux display-message -p 'Session: #{session_name}\nWindow: #{window_index} #{window_name}\nPath: #{pane_current_path}\nCommand: #{pane_current_command}\nPID: #{pane_pid}' && read -r -p '按回车关闭'"

# 手动设置侧栏显示标题/描述（不重命名 tmux window）
bind T command-prompt -p "侧栏标题" "set-option -w @sidebar_window_title '%%' \; run-shell -b 'GUILE_AUTO_COMPILE=0 guile --no-auto-compile -s ~/.config/tmux/scripts/sidebar-render.scm data'"
bind D command-prompt -p "侧栏描述" "set-option -w @sidebar_window_desc '%%' \; run-shell -b 'GUILE_AUTO_COMPILE=0 guile --no-auto-compile -s ~/.config/tmux/scripts/sidebar-render.scm data'"

# 手动折叠/展开组
bind G run-shell "GUILE_AUTO_COMPILE=0 guile --no-auto-compile -s ~/.config/tmux/scripts/sidebar-render.scm toggle-group"

# 默认启动侧栏与缓存采集。放到末尾，确保选项和 hooks 已就绪。
run-shell -b "GUILE_AUTO_COMPILE=0 guile --no-auto-compile -s ~/.config/tmux/scripts/sidebar-render.scm data; ~/.config/tmux/scripts/sidebar-toggle follow"
