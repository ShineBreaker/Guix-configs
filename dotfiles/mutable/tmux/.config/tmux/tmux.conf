# ========== 基础设置 ==========
# 设置真彩色支持（针对 foot 优化）
set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",foot*:Tc:RGB"
set -ga terminal-overrides ",xterm-256color:Tc"
# foot 终端键码优化
set -ga terminal-overrides ",foot*:kUP5=\E[1;5A:kDN5=\E[1;5B:kLFT5=\E[1;5D:kRIT5=\E[1;5C"

# 前缀键改为 Ctrl+x
set -g prefix C-x
bind C-x send-prefix

# 窗口和窗格索引从 1 开始（更直观）
set -g base-index 1
setw -g pane-base-index 1

# 自动重新编号窗口
set -g renumber-windows on

# ========== 顶部上下文条 ==========
set -g status on
set -g status-position top
set -g status-justify centre
set -g status-style bg=default,fg=brightwhite
set -g status-left-length 120
set -g status-right-length 100

# 左侧：工作区信息（前导空格避免圆角遮挡）
set -g status-left ' #{?client_prefix,#[fg=brightred],#[fg=default]} #{?client_prefix,#[fg=brightred],#[fg=brightgreen,bold]}#S#{?@status_git_branch, #[fg=cyan]·  #{@status_git_branch},} #[fg=brightblue]·  #{pane_current_command} #[fg=white]·  #{b:pane_current_path}#{?window_zoomed_flag, #[fg=brightyellow]·  ,}#{?pane_in_mode, #[fg=brightcyan]·  ,}'

# 右侧：系统状态（尾部空格避免圆角遮挡）
set -g status-right '#[fg=brightblack] #(cut -d. -f1 /proc/loadavg) #[fg=brightblack]·  #{client_width}x#{client_height} #[fg=brightyellow]·  #H '

# 关闭原生窗口标签（由侧栏承担）
set -g window-status-current-style bg=default,fg=default
set -g window-status-style fg=default,bg=default
# 中央：日期时间（通过 window-status-current-format 居中）
set -g window-status-current-format '#[fg=brightwhite] #[fg=brightyellow]#(date +%Y-%m-%d) #[fg=white]·  #[fg=brightwhite]#(date +%H:%M)'
set -g window-status-format ''
set -g window-status-separator ''

# 窗格边框
set -g pane-border-style fg=brightblack
set -g pane-active-border-style fg=brightblue
set -g display-panes-time 1200

# ========== 键位绑定 ==========
# 重新加载配置
bind r source-file ~/.config/tmux/tmux.conf \; display "配置已重载！"

# 显示帮助文档
bind \? run-shell "bash ~/.config/tmux/scripts/which-key"

# 分屏（保持当前路径）
bind \\ split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
unbind '"'
unbind %

# 使用 Alt+方向键切换窗格（无需前缀）
bind -n M-Left select-pane -L
bind -n M-Right select-pane -R
bind -n M-Up select-pane -U
bind -n M-Down select-pane -D

# 使用 Ctrl+方向键调整窗格大小（无需前缀）
bind -n C-Left resize-pane -L 2
bind -n C-Right resize-pane -R 2
bind -n C-Up resize-pane -U 2
bind -n C-Down resize-pane -D 2

# 使用 hjkl 切换窗格
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# 快速切换窗口
bind -n M-1 select-window -t 1
bind -n M-2 select-window -t 2
bind -n M-3 select-window -t 3
bind -n M-4 select-window -t 4
bind -n M-5 select-window -t 5

# ========== Kitty 风格快捷键迁移 ==========
# kitty window ≈ tmux pane；kitty tab ≈ tmux window。
bind -n M-N split-window -c "#{pane_current_path}"
bind -n M-K confirm-before -p "关闭当前窗格 #P? (y/n)" kill-pane
bind -n M-C new-window -c "#{pane_current_path}"
bind -n M-X confirm-before -p "关闭当前窗口 #W? (y/n)" kill-window

bind -n M-S-Right next-window
bind -n M-S-Left previous-window
bind -n M-S-Down select-pane -t :.+
bind -n M-S-Up select-pane -t :.-

bind -n C-M-Down swap-pane -D
bind -n C-M-Up swap-pane -U
bind -n M-Space swap-pane -t :.1

bind -n M-! select-pane -t 1
bind -n M-@ select-pane -t 2
bind -n M-# select-pane -t 3
bind -n M-$ select-pane -t 4
bind -n M-% select-pane -t 5
bind -n M-^ select-pane -t 6
bind -n M-& select-pane -t 7
bind -n M-* select-pane -t 8
bind -n M-( select-pane -t 9
bind -n M-) select-pane -t 10

bind -n M-L next-layout
bind -n M-| select-layout main-vertical
bind -n M-_ select-layout main-horizontal
bind -n M-R switch-client -T resize-pane
bind -T resize-pane Left resize-pane -L 4 \; switch-client -T resize-pane
bind -T resize-pane Right resize-pane -R 4 \; switch-client -T resize-pane
bind -T resize-pane Up resize-pane -U 2 \; switch-client -T resize-pane
bind -T resize-pane Down resize-pane -D 2 \; switch-client -T resize-pane
bind -T resize-pane h resize-pane -L 4 \; switch-client -T resize-pane
bind -T resize-pane l resize-pane -R 4 \; switch-client -T resize-pane
bind -T resize-pane k resize-pane -U 2 \; switch-client -T resize-pane
bind -T resize-pane j resize-pane -D 2 \; switch-client -T resize-pane
bind -T resize-pane Escape switch-client -T root
bind -T resize-pane q switch-client -T root

bind -n M-H copy-mode -u
bind -n M-F command-prompt -i -p "搜索回滚" "copy-mode \; send-keys -X search-backward '%%'"
bind -n M-/ command-prompt -p "tmux 命令" "%%"
bind -n S-Insert run "wl-paste --primary | tmux load-buffer - && tmux paste-buffer"

# ========== Kitty 风格滚动快捷键 ==========
# Alt+Shift+K/J - 逐行滚动（匹配 kitty 的 scroll_line_up/down）
bind -n M-S-k send-keys -X scroll-up
bind -n M-S-j send-keys -X scroll-down
# Alt+Shift+PageUp/Down - 逐页滚动（匹配 kitty 的 scroll_page_up/down）
bind -n M-S-PageUp send-keys -X halfpage-up
bind -n M-S-PageDown send-keys -X halfpage-down
# Alt+Shift+Home/End - 跳转到历史记录顶部/底部
bind -n M-S-Home send-keys -X history-top
bind -n M-S-End send-keys -X history-bottom

# ========== 鼠标支持 ==========
set -g mouse on
# 鼠标点击时聚焦并传递事件
bind-key -T root MouseDown1Pane if-shell -F '#{==:#{pane_title},tmux-sidebar}' \
  'run-shell -b "GUILE_AUTO_COMPILE=0 guile --no-auto-compile -s ~/.config/tmux/scripts/sidebar-render.scm click #{mouse_y} #{pane_top} #{pane_id}"' \
  'select-pane -t =; send-keys -M; run-shell -b "~/.config/tmux/scripts/sidebar-toggle signal"'
# 鼠标滚轮：滚动历史记录，进入 copy-mode 并滚动
bind-key -T root WheelUpPane if-shell -F -t = "#{alternate_on}" "send-keys -M" "copy-mode -e; send-keys -X scroll-up"
bind-key -T root WheelDownPane if-shell -F -t = "#{alternate_on}" "send-keys -M" "if-shell -F '#{pane_in_mode}' 'send-keys -X scroll-down' 'copy-mode -e; send-keys -X scroll-down'"

# ========== 复制模式（Vi 风格 + Wayland） ==========
setw -g mode-keys vi

# 进入复制模式
bind [ copy-mode
bind Escape copy-mode
bind -T copy-mode-vi Escape send-keys -X cancel
bind -T copy-mode-vi v send-keys -X begin-selection
bind -T copy-mode-vi y send-keys -X copy-pipe-and-cancel "wl-copy"
bind -T copy-mode-vi Enter send-keys -X copy-pipe-and-cancel "wl-copy"
bind -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-pipe-and-cancel "wl-copy"

# 粘贴
bind p run "wl-paste | tmux load-buffer - && tmux paste-buffer"

# ========== 性能优化 ==========
# 历史记录
set -g history-limit 50000

# 减少延迟
set -sg escape-time 0
set -g repeat-time 300

# 启用焦点事件
set -g focus-events on

# ========== 窗口管理 ==========
# 自动重命名窗口
setw -g automatic-rename on
set -g automatic-rename-format '#{b:pane_current_path}'

# 终端标题
set -g set-titles on
set -g set-titles-string '#S:#I:#W - tmux'

# 监控活动
setw -g monitor-activity on
set -g visual-activity off

# ========== 其他设置 ==========
# 允许使用系统剪贴板
set -s set-clipboard on

# 更长的消息显示时间
set -g display-time 2000

# ========== 侧边栏标签栏 ==========
# 配色（使用终端 ANSI 颜色，由 foot/darkman 驱动）
set -g @sidebar_width 32
set -g @sidebar_bg "default"
set -g @sidebar_fg "white"
set -g @sidebar_active_fg "brightblue"
set -g @sidebar_group_fg "brightcyan"
set -g @sidebar_activity_fg "brightyellow"

# 浮动窗格状态。该选项表达用户偏好；具体 pane id 按窗口保存。
set -g @sidebar_visible 1

# 状态栏间隔（用于活动检测轮询 + 数据刷新 + 前缀键提示刷新）
set -g status-interval 1

# 侧边栏 hooks（信号驱动：窗格/布局变化时通知 pane-loop 重新采集渲染）
# 规则：仅用户主动切换窗口/客户端时 follow；split/kill/resize 只 signal，
# 因为 create_sidebar 内部的 split+kill 会触发这些 hook，follow 会级联导致频闪。
set-hook -g after-select-pane 'run-shell -b "~/.config/tmux/scripts/sidebar-toggle signal"'
set-hook -g after-split-window 'run-shell -b "~/.config/tmux/scripts/sidebar-toggle signal"'
set-hook -g after-kill-pane 'run-shell -b "~/.config/tmux/scripts/sidebar-toggle signal"'
set-hook -g after-select-layout 'run-shell -b "~/.config/tmux/scripts/sidebar-toggle signal"'
set-hook -g after-resize-pane 'run-shell -b "~/.config/tmux/scripts/sidebar-toggle signal"'
set-hook -g after-new-window 'run-shell -b "~/.config/tmux/scripts/sidebar-toggle signal; ~/.config/tmux/scripts/sidebar-toggle follow"'
set-hook -g window-unlinked 'run-shell -b "~/.config/tmux/scripts/sidebar-toggle signal"'
# 新 session / session 切换时创建 sidebar（这些 hook 不经过 after-new-window）
set-hook -g after-new-session 'run-shell -b "~/.config/tmux/scripts/sidebar-toggle signal; ~/.config/tmux/scripts/sidebar-toggle follow"'
set-hook -g client-session-changed 'run-shell -b "~/.config/tmux/scripts/sidebar-toggle signal; ~/.config/tmux/scripts/sidebar-toggle follow"'
# 侧边栏跟随：窗口/客户端变化时确保当前窗口有自己的侧栏。
set-hook -g after-select-window 'run-shell -b "~/.config/tmux/scripts/sidebar-toggle signal; ~/.config/tmux/scripts/sidebar-toggle follow"'
set-hook -g client-attached 'run-shell -b "~/.config/tmux/scripts/sidebar-toggle signal; ~/.config/tmux/scripts/sidebar-toggle follow"'
set-hook -g client-active 'run-shell -b "~/.config/tmux/scripts/sidebar-toggle signal; ~/.config/tmux/scripts/sidebar-toggle follow"'
set-hook -g client-resized 'run-shell -b "~/.config/tmux/scripts/sidebar-toggle follow"'

# 侧边栏切换
bind B run-shell "~/.config/tmux/scripts/sidebar-toggle"

# 模糊窗口跳转
bind f display-popup -E -w 80% -h 60% -b rounded "~/.config/tmux/scripts/window-jump"

# 手动刷新 git 信息
bind g run-shell "GUILE_AUTO_COMPILE=0 guile --no-auto-compile -s ~/.config/tmux/scripts/sidebar-render.scm git; ~/.config/tmux/scripts/sidebar-toggle signal" \; display-message "git 信息已刷新"

# 窗口详情弹窗
bind i display-popup -E -w 60% -h 40% -b rounded \
  "tmux display-message -p 'Session: #{session_name}\nWindow: #{window_index} #{window_name}\nPath: #{pane_current_path}\nCommand: #{pane_current_command}\nPID: #{pane_pid}' && read -r -p '按回车关闭'"

# 手动设置侧栏显示标题/描述（不重命名 tmux window）
bind T command-prompt -p "侧栏标题" "set-option -w @sidebar_window_title '%%' \; run-shell -b 'GUILE_AUTO_COMPILE=0 guile --no-auto-compile -s ~/.config/tmux/scripts/sidebar-render.scm data'"
bind D command-prompt -p "侧栏描述" "set-option -w @sidebar_window_desc '%%' \; run-shell -b 'GUILE_AUTO_COMPILE=0 guile --no-auto-compile -s ~/.config/tmux/scripts/sidebar-render.scm data'"

# 手动折叠/展开组
bind G run-shell "GUILE_AUTO_COMPILE=0 guile --no-auto-compile -s ~/.config/tmux/scripts/sidebar-render.scm toggle-group"

# 默认启动侧栏（pane-loop 创建后自动渲染，无需额外 signal）
run-shell -b "~/.config/tmux/scripts/sidebar-toggle follow"
