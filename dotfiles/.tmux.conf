# ========== 基础设置 ==========
# 设置真彩色支持（针对 foot 优化）
set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",foot*:Tc:RGB"
set -ga terminal-overrides ",xterm-256color:Tc"
# foot 终端键码优化
set -ga terminal-overrides ",foot*:kUP5=\E[1;5A:kDN5=\E[1;5B:kLFT5=\E[1;5D:kRIT5=\E[1;5C"

# 前缀键保持 Ctrl+b
set -g prefix C-b
bind C-b send-prefix

# 窗口和窗格索引从 1 开始（更直观）
set -g base-index 1
setw -g pane-base-index 1

# 自动重新编号窗口
set -g renumber-windows on

# ========== 状态栏 ==========
set -g status on
set -g status-position bottom
set -g status-justify left
set -g status-style bg=black,fg=white
set -g status-left-length 40
set -g status-right-length 60
set -g status-left '#[fg=green,bold]#{?client_prefix,#[bg=blue] PREFIX ,}[#S] '
set -g status-right '#[fg=yellow]%Y-%m-%d #[fg=white]%H:%M'

# 窗口状态
set -g window-status-current-style bg=blue,fg=white,bold
set -g window-status-style fg=white,dim
set -g window-status-format ' #I:#W '
set -g window-status-current-format ' #I:#W '

# 窗格边框
set -g pane-border-style fg=colour240
set -g pane-active-border-style fg=blue

# ========== 键位绑定 ==========
# 重新加载配置
bind r source-file ~/.tmux.conf \; display "配置已重载！"

# 显示帮助文档
bind \? display-popup -E -w 70% -h 70% -b rounded \
  "printf '\n  TMUX 快捷键帮助\n\n' && \
   printf '  基础操作:\n' && \
   printf '    Ctrl+b r       重新加载配置\n' && \
   printf '    Ctrl+b \?       显示此帮助\n\n' && \
   printf '  窗格操作:\n' && \
   printf '    Alt+方向键     切换窗格\n' && \
   printf '    Ctrl+方向键    调整窗格大小\n' && \
   printf '    Ctrl+b \\       垂直分屏\n' && \
   printf '    Ctrl+b -       水平分屏\n' && \
   printf '    Ctrl+b jkl     vim风格切换窗格\n\n' && \
   printf '  窗口操作:\n' && \
   printf '    Alt+1-5        快速切换窗口\n\n' && \
   printf '  复制模式:\n' && \
   printf '    Ctrl+b [       进入复制模式\n' && \
   printf '    v              开始选择\n' && \
   printf '    y              复制到剪贴板\n' && \
   printf '    Ctrl+b p       粘贴\n\n' && \
   printf '  按 q 或 Esc 关闭此窗口\n' && \
   read -n 1"

# 分屏（保持当前路径）
bind \\ split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
unbind '"'
unbind %

# 使用 Alt+方向键切换窗格（无需前缀）
bind -n M-Left select-pane -L
bind -n M-Right select-pane -R
bind -n M-Up select-pane -U
bind -n M-Down select-pane -D

# 使用 Ctrl+方向键调整窗格大小（无需前缀）
bind -n C-Left resize-pane -L 2
bind -n C-Right resize-pane -R 2
bind -n C-Up resize-pane -U 2
bind -n C-Down resize-pane -D 2

# 使用 hjkl 切换窗格
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# 快速切换窗口
bind -n M-1 select-window -t 1
bind -n M-2 select-window -t 2
bind -n M-3 select-window -t 3
bind -n M-4 select-window -t 4
bind -n M-5 select-window -t 5

# ========== 鼠标支持 ==========
set -g mouse on

# ========== 复制模式（Vi 风格 + Wayland） ==========
setw -g mode-keys vi

# 进入复制模式
bind [ copy-mode
bind Escape copy-mode

# Vi 风格的复制粘贴
bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi y send -X copy-pipe-and-cancel "wl-copy"
bind -T copy-mode-vi MouseDragEnd1Pane send -X copy-pipe-and-cancel "wl-copy"

# 粘贴
bind p run "wl-paste | tmux load-buffer - && tmux paste-buffer"

# ========== 性能优化 ==========
# 历史记录
set -g history-limit 50000

# 减少延迟
set -sg escape-time 0
set -g repeat-time 300

# 启用焦点事件
set -g focus-events on

# ========== 窗口管理 ==========
# 自动重命名窗口
setw -g automatic-rename on
set -g automatic-rename-format '#{b:pane_current_path}'

# 终端标题
set -g set-titles on
set -g set-titles-string '#S:#I:#W - tmux'

# 监控活动
setw -g monitor-activity on
set -g visual-activity off

# ========== 其他设置 ==========
# 允许使用系统剪贴板
set -s set-clipboard on

# 更长的消息显示时间
set -g display-time 2000
