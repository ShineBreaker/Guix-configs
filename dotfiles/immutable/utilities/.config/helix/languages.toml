[language-server.ccls]
command = "ccls"

[language-server.jdtls]
command = "jdtls"

[language-server.pylsp]
command = "pylsp"
config.pylsp.plugins.black.enabled = true
config.pylsp.plugins.mypy.enabled = true
config.pylsp.plugins.rope.enabled = true

[language-server.rust-analyzer]
command = "rust-analyzer"

[language-server.gopls]
command = "gopls"

[language-server.omnisharp]
command = "omnisharp-wrapper"
args = ["-lsp"]

[language-server.zls]
command = "zls"

[[language]]
name = "bash"
auto-format = true
formatter = { command = "shfmt", args = ["-s", "-"] }

[[language]]
name = "c"
auto-format = true
formatter = { command = "clang-format", args = [
  "-style=file",
  "-assume-filename=%{buffer_name}",
] }
language-servers = ["ccls"]

[[language]]
name = "cpp"
auto-format = true
formatter = { command = "clang-format", args = [
  "-style=file",
  "-assume-filename=%{buffer_name}",
] }
language-servers = ["ccls"]

[[language]]
name = "fish"
auto-format = true
formatter = { command = "fish_indent" }

[[language]]
name = "go"
auto-format = true
formatter = { command = "gofmt" }
language-servers = ["gopls"]

[[language]]
name = "csharp"
auto-format = true
language-servers = ["omnisharp"]

[[language]]
name = "java"
auto-format = true
language-servers = ["jdtls"]

[[language]]
name = "json"
auto-format = true
formatter = { command = "js-beautify", args = [
  "--stdin",
  "--indent-size",
  "2",
  "-",
] }

[[language]]
name = "jsonc"
auto-format = true
formatter = { command = "js-beautify", args = [
  "--stdin",
  "--indent-size",
  "2",
  "-",
] }

[[language]]
name = "nix"
auto-format = true
formatter = { command = "nixfmt" }

[[language]]
name = "python"
auto-format = true
formatter = { command = "black", args = [
  "--quiet",
  "--stdin-filename",
  "%{buffer_name}",
  "-",
] }
language-servers = ["pylsp"]

[[language]]
name = "rust"
auto-format = true
formatter = { command = "rustfmt" }
language-servers = ["rust-analyzer"]

[[language]]
name = "yaml"
auto-format = true
formatter = { command = "yq", args = ["-P", "-"] }

[[language]]
name = "zig"
auto-format = true
formatter = { command = "zig", args = ["fmt", "--stdin", "-"] }
language-servers = ["zls"]
