# =============================================================================
# 现代终端 IDE 体验 — tmux 主配置
# =============================================================================
#
# 设计目标：将 tmux 从基础的窗口管理器升级为 workspace manager，
# 提供直观的视觉导航、智能会话管理和高效的工作流。
#
# 架构要点：
#   - 采用长驻 Guile 渲染进程 + Bash 生命周期适配器
#   - 不使用 TPM 插件系统，通过外部脚本 + tmux hooks 实现
#   - 不使用 TPM/jq，不引入额外包管理器
#   - 标签栏配色直接使用终端 ANSI 颜色，由 foot/darkman 驱动自动切换亮暗
#   - 最低 tmux 版本要求：3.3a（XDG 支持 + 完善的 -F 格式化 + hook 支持）
#
# 文件结构：
#   ~/.config/tmux/
#   ├── tmux.conf                      # 本文件 — 主配置
#   └── scripts/
#       ├── sidebar-toggle             # [Bash]  侧边栏开关（创建/销毁/跟随 floating pane）
#       ├── sidebar-render.scm         # [Guile] 数据采集 + 标签栏渲染 + 鼠标点击处理
#       ├── window-jump                # [Bash]  模糊窗口跳转（fzf）
#       └── which-key                  # [Bash]  快捷键帮助弹窗
#
# 侧边栏设计要点：
#   - P0 验证：status-left 的 \n 在 foot + tmux 中不渲染为多行 → 改用 floating pane
#   - 浮动窗格：tmux split-window -h -b -f -l <width> 在终端左侧创建持久窗格
#   - 渲染：显示层级树（Session → Group → Window → Pane），每 pane 一条数据
#   - 刷新：FIFO 事件驱动即时重绘，30 秒无 fork 心跳兜底
#   - 数据采集：每次刷新只执行一次 tmux list-panes 快照
#   - 状态栏：移到顶部作为上下文条（三段式：工作区信息 | 日期时间 | 系统状态）
#   - window tabs 不在 status 中显示，由左侧侧栏承担导航功能
#
# 运行时数据路径：
#   /tmp/tmux-sidebar-<uid>-<pane>.fifo
#   /tmp/tmux-sidebar-<uid>-<socket>-<window>.lock
#
# =============================================================================

# ========== 基础设置 ==========
# pane 内使用 tmux 自己的 terminfo；外层 foot 能力由 tmux 3.6 自动检测。
set -g default-terminal "tmux-256color"
# 附着新客户端时同步其 truecolor 提示，不硬编码具体终端类型。
set -g update-environment "DISPLAY KRB5CCNAME MSYSTEM SSH_ASKPASS SSH_AUTH_SOCK SSH_AGENT_PID SSH_CONNECTION WINDOWID XAUTHORITY COLORTERM"

# 前缀键改为 Ctrl+x（与原始的 Ctrl+b 区分），
# 因为侧边栏和快捷键密集，需要短键程。
set -g prefix C-x
bind C-x send-prefix

# 窗口和窗格索引从 1 开始（更直观）
set -g base-index 1
setw -g pane-base-index 1

# 自动重新编号窗口
set -g renumber-windows on

# ========== 顶部上下文条 ==========
# 状态栏移到顶部，作为上下文信息条。
# window tabs 不在 status 中显示，由左侧侧栏承担导航功能。
#
# 三段式布局原理：
#   - tmux 状态栏三段结构为 left | center(窗口列表) | right
#   - status-justify centre 让中间窗口列表区域居中对齐
#   - window-status-current-format 显示日期时间，借用窗口标签位置实现居中
#   - window-status-format 设为空，非当前窗口不显示，避免干扰
#   - 默认 status-format 用 #{T:window-status-current-format} 展开 strftime
set -g status on
set -g status-position top
set -g status-justify centre
set -g status-style bg=default,fg=brightwhite
set -g status-left-length 120
set -g status-right-length 100

# 左侧：工作区信息（前导空格避免圆角遮挡）
# 前缀键视觉反馈：按 Ctrl+x 时，前缀图标从 （空心）变为 （实心红色），
#                 session 名从绿色变为红色；松开后恢复默认样式。
#                 Git branch 由长驻 sidebar-render.scm 写入窗口级
#                 @status_git_branch 选项，零开销引用。使用窗口级而非全局级，
#                 避免多 session 场景下 daemon 互相覆盖。
set -g status-left ' #{?client_prefix,#[fg=brightred],#[fg=default]} #{?client_prefix,#[fg=brightred],#[fg=brightgreen,bold]}#S#{?@status_git_branch, #[fg=cyan]·  #{@status_git_branch},} #[fg=brightblue]·  #{pane_current_command} #[fg=white]·  #{b:pane_current_path}#{?window_zoomed_flag, #[fg=brightyellow]·  ,}#{?pane_in_mode, #[fg=brightcyan]·  ,}'

# 右侧：系统状态（尾部空格避免圆角遮挡）
set -g status-right '#[fg=brightblack] #(cut -d. -f1 /proc/loadavg) #[fg=brightblack]·  #{client_width}x#{client_height} #[fg=brightyellow]·  #H '

# 关闭原生窗口标签（由侧栏承担）
set -g window-status-current-style bg=default,fg=default
set -g window-status-style fg=default,bg=default

# 中央：日期时间。status-format 会通过 #{T:...} 原生展开 strftime，
# 无需每次刷新启动两个 date 进程。
set -g window-status-current-format '#[fg=brightwhite] #[fg=brightyellow]%Y-%m-%d #[fg=white]·  #[fg=brightwhite]%H:%M'
set -g window-status-format ''
set -g window-status-separator ''

# 窗格边框
set -g pane-border-style fg=brightblack
set -g pane-active-border-style fg=brightblue
set -g display-panes-time 1200

# ========== 键位绑定 ==========
# 重新加载配置
bind r source-file ~/.config/tmux/tmux.conf \; display "配置已重载！"

# 显示快捷键帮助弹窗
bind \? run-shell "bash ~/.config/tmux/scripts/which-key"

# 水平/垂直分屏（保持当前路径）
bind \\ split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
unbind '"'
unbind %

# Alt+方向键：无需前缀直接切换窗格
bind -n M-Left select-pane -L
bind -n M-Right select-pane -R
bind -n M-Up select-pane -U
bind -n M-Down select-pane -D

# Ctrl+方向键：无需前缀，直接调整窗格大小
bind -n C-Left resize-pane -L 2
bind -n C-Right resize-pane -R 2
bind -n C-Up resize-pane -U 2
bind -n C-Down resize-pane -D 2

# 前缀键后使用 hjkl 切换窗格（Vi 风格）
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# ========== 窗口/会话管理 ==========
# c/x/Kitty 风格：c 新建窗口，x 关闭窗格，X 关闭窗口
bind c new-window -c "#{pane_current_path}"
bind x kill-pane
bind X kill-window
bind K kill-session
bind C new-session

# Alt+数字：无需前缀，快速切换到指定窗口
bind -n M-1 select-window -t 1
bind -n M-2 select-window -t 2
bind -n M-3 select-window -t 3
bind -n M-4 select-window -t 4
bind -n M-5 select-window -t 5

bind -n M-H copy-mode -u                   # Alt+Shift+H → copy-mode 回滚
bind -n M-F command-prompt -i -p "搜索回滚" "copy-mode \; send-keys -X search-backward '%%'"  # Alt+Shift+F → 搜索回滚
bind -n M-/ command-prompt -p "tmux 命令" "%%"  # Alt+Shift+/ → tmux command prompt
bind -n S-Insert run "wl-paste --primary | tmux load-buffer - && tmux paste-buffer"

# ========== 鼠标支持 ==========
set -g mouse on

# 鼠标点击侧栏时触发 click 处理（选择 session/window/group 或执行操作）；
# 点击其他 pane 时先聚焦，再发送鼠标事件，然后 signal 侧栏刷新。
bind-key -T root MouseDown1Pane if-shell -F '#{==:#{pane_title},tmux-sidebar}' \
  'run-shell -b "~/.config/tmux/scripts/sidebar-toggle click #{mouse_y} #{pane_top} #{pane_id} #{q:client_name}"' \
  'select-pane -t =; send-keys -M; run-shell -b "~/.config/tmux/scripts/sidebar-toggle signal"'

# 鼠标滚轮处理：
# - alternate_on（全屏程序如 less/vim）→ 发送滚轮事件给程序
# - 否则 → 进入 copy-mode 并滚动（替代 tmux 默认的逐行滚动）
bind-key -T root WheelUpPane if-shell -F -t = "#{alternate_on}" "send-keys -M" "copy-mode -e; send-keys -X scroll-up"
bind-key -T root WheelDownPane if-shell -F -t = "#{alternate_on}" "send-keys -M" "if-shell -F '#{pane_in_mode}' 'send-keys -X scroll-down' 'copy-mode -e; send-keys -X scroll-down'"

# ========== 复制模式（Vi 风格 + Wayland） ==========
setw -g mode-keys vi

# 进入复制模式
bind [ copy-mode
bind Escape copy-mode
bind -T copy-mode-vi Escape send-keys -X cancel
bind -T copy-mode-vi v send-keys -X begin-selection   # v 开始选择
bind -T copy-mode-vi y send-keys -X copy-pipe-and-cancel "wl-copy"  # y 复制到 wayland 剪贴板
bind -T copy-mode-vi Enter send-keys -X copy-pipe-and-cancel "wl-copy"
bind -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-pipe-and-cancel "wl-copy"

# 粘贴（从 wayland 剪贴板）
bind p run "wl-paste | tmux load-buffer - && tmux paste-buffer"

# ========== 性能优化 ==========
# 历史记录上限 5 万行（兼顾回溯能力和内存）
set -g history-limit 50000

# 减少延迟
set -sg escape-time 0      # 取消 Escape 键的超时等待，避免 Alt 组合延迟
set -g repeat-time 300     # 重复前缀键的操作时间窗口（毫秒）

# 启用焦点事件（让终端感知 tmux 的焦点变化，主要用于 IDE 集成）
set -g focus-events on

# ========== 窗口管理 ==========
# 自动重命名窗口为当前路径的 basename
setw -g automatic-rename on
set -g automatic-rename-format '#{b:pane_current_path}'

# 终端标题显示 session:window:pane
set -g set-titles on
set -g set-titles-string '#S:#I:#W - tmux'

# ========== 其他设置 ==========
# 允许 wayland 剪贴板集成
set -s set-clipboard on

# 消息显示时长 2 秒
set -g display-time 2000

# ========== 侧边栏标签栏 ==========
# 侧边栏作为浮动 pane 显示，width=32 列，使用终端 ANSI 色。
# 配色由 foot/darkman 驱动自动切换亮暗。
set -g @sidebar_width 32

# 浮动窗格状态。该选项只表达用户偏好，pane 通过实时快照识别。
if-shell -F '#{==:#{@sidebar_visible},}' 'set-option -g @sidebar_visible 1' ''

# 时间只显示到分钟；5 秒刷新足以更新负载且显著减少 #() 子进程。
set -g status-interval 5

# ========== 侧边栏 hooks ==========
# 事件驱动架构：窗格/布局变化时通过 FIFO 通知长驻渲染进程。
# signal 与 follow 的区别：
#   - signal：写 refresh 事件，触发重新渲染（不会创建/销毁 pane）
#   - follow：确保当前窗口有自己的侧栏 pane（创建或跟随到当前窗口）
# window-layout-changed 统一覆盖 split/kill/resize/layout，避免重复 hook。
set-hook -g after-select-pane 'run-shell -b "~/.config/tmux/scripts/sidebar-toggle signal"'
set-hook -g window-layout-changed 'run-shell -b "~/.config/tmux/scripts/sidebar-toggle signal"'
set-hook -g window-renamed 'run-shell -b "~/.config/tmux/scripts/sidebar-toggle signal"'
set-hook -g session-renamed 'run-shell -b "~/.config/tmux/scripts/sidebar-toggle signal"'
set-hook -g after-new-window 'run-shell -b "~/.config/tmux/scripts/sidebar-toggle follow"'
set-hook -g window-unlinked 'run-shell -b "~/.config/tmux/scripts/sidebar-toggle signal"'

# 新 session / session 切换时创建 sidebar（这些 hook 不经过 after-new-window）
set-hook -g after-new-session 'run-shell -b "~/.config/tmux/scripts/sidebar-toggle follow"'
set-hook -g client-session-changed 'run-shell -b "~/.config/tmux/scripts/sidebar-toggle follow"'

# 窗口切换/客户端连接时确保侧栏跟随当前窗口。
set-hook -g after-select-window 'run-shell -b "~/.config/tmux/scripts/sidebar-toggle follow"'
set-hook -g client-attached 'run-shell -b "~/.config/tmux/scripts/sidebar-toggle follow"'
set-hook -g client-active 'run-shell -b "~/.config/tmux/scripts/sidebar-toggle follow"'
set-hook -g client-resized 'run-shell -b "~/.config/tmux/scripts/sidebar-toggle follow"'

# ========== 自定义快捷键 ==========
# B（前缀键 → Ctrl+x B）：切换侧边栏显示/隐藏
bind B run-shell "~/.config/tmux/scripts/sidebar-toggle"

# f（前缀键 → Ctrl+x f）：模糊窗口跳转（fzf 弹窗）
bind f display-popup -E -w 80% -h 60% -b rounded "~/.config/tmux/scripts/window-jump"

# i（前缀键 → Ctrl+x i）：弹窗显示当前窗格详情
bind i display-popup -E -w 60% -h 40% -b rounded \
  "tmux display-message -p 'Session: #{session_name}\nWindow: #{window_index} #{window_name}\nPath: #{pane_current_path}\nCommand: #{pane_current_command}\nPID: #{pane_pid}' && read -r -p '按回车关闭'"

# T（前缀键 → Ctrl+x T）：手动设置侧栏窗口标题（不重命名 tmux window）
bind T command-prompt -p "侧栏标题" "set-option -w @sidebar_window_title '%%' \; run-shell -b '~/.config/tmux/scripts/sidebar-toggle signal'"

# D（前缀键 → Ctrl+x D）：手动设置侧栏窗口描述
bind D command-prompt -p "侧栏描述" "set-option -w @sidebar_window_desc '%%' \; run-shell -b '~/.config/tmux/scripts/sidebar-toggle signal'"

# G（前缀键 → Ctrl+x G）：手动折叠/展开侧栏中的分组
bind G run-shell "~/.config/tmux/scripts/sidebar-toggle toggle-group"

# 默认启动侧栏（daemon 创建后立即渲染）
run-shell -b "~/.config/tmux/scripts/sidebar-toggle follow"

# 适配 Pi Agent
set -g extended-keys on
set -g extended-keys-format csi-u
