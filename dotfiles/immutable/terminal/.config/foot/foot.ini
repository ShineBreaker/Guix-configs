[main]
include=~/.config/foot/initial-color-theme.ini
include=~/.config/foot/themes/noctalia

dpi-aware=yes
font=Maple Mono NF CN
pad=0x0
selection-target=clipboard
shell=/run/current-system/profile/bin/fish
term=foot

[colors-dark]
alpha=0.88
blur=yes

[colors-light]
alpha=0.88
blur=yes

[cursor]
style=beam

[csd]
preferred=none

[mouse]
hide-when-typing=yes

[scrollback]
lines=50000
multiplier=3.0

[tweak]
grapheme-shaping=yes
