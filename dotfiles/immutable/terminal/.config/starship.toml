"$schema" = "https://starship.rs/config-schema.json"
format = " $os$username$directory$git_branch$git_status$c$cpp$rust$golang$nodejs$php$java$kotlin$haskell$python$direnv$docker_context$conda$pixi$time$line_break$character"

[c]
format = "┬╖[ $symbol( $version) ]($style)"
style = "fg:blue"
symbol = "Όαη"

[character]
disabled = false
error_symbol = "[>](bold red)"
success_symbol = "[>](bold green)"
vimcmd_replace_one_symbol = "[ΎΒι](bold magenta)"
vimcmd_replace_symbol = "[ΎΒι](bold magenta)"
vimcmd_symbol = "[>](bold green)"
vimcmd_visual_symbol = "[ΎΒι](bold yellow)"

[conda]
format = "┬╖[ $symbol( $environment) ]($style)"
style = "fg:bright-black"
symbol = ""

[cpp]
format = "┬╖[ $symbol( $version) ]($style)"
style = "fg:blue"
symbol = "Όαζ"

[directory]
format = "┬╖[ $path ]($style)"
style = "fg:yellow"
truncation_length = 3
truncation_symbol = "έΑο/"

[directory.substitutions]
Developer = "≤░▓Μ"
Documents = "≤░Ιβ"
Downloads = "ΎΑβ"
Music = "≤░ζγ"
Pictures = "ΎΑ╛"

[direnv]
disabled = false
format = "┬╖[ $symbol $loaded/$allowed ]($style)"
style = "fg:bright-black"
symbol = "ΎΜε"

[docker_context]
format = "┬╖[ $symbol( $context) ]($style)"
style = "fg:bright-black"
symbol = "ΎΝΙ"

[git_branch]
format = "┬╖[ $symbol $branch ]($style)"
style = "fg:cyan"
symbol = "ΎΡα"

[git_status]
format = "[($all_status$ahead_behind )]($style)"
style = "fg:cyan"

[golang]
format = "┬╖[ $symbol( $version) ]($style)"
style = "fg:blue"
symbol = "Όαπ"

[haskell]
format = "┬╖[ $symbol( $version) ]($style)"
style = "fg:blue"
symbol = "Όαθ"

[java]
format = "┬╖[ $symbol( $version) ]($style)"
style = "fg:blue"
symbol = "ΌΚΨ"

[kotlin]
format = "┬╖[ $symbol( $version) ]($style)"
style = "fg:blue"
symbol = "Όα┤"

[line_break]
disabled = false

[nodejs]
format = "┬╖[ $symbol( $version) ]($style)"
style = "fg:blue"
symbol = "Όεα"

[os]
disabled = false
format = "[ $symbol ]($style)"
style = "fg:green"

[os.symbols]
Alpine = "ΎΝΑ"
Amazon = "ΎΚ░"
Android = "ΌεΟ"
Arch = "≤░μΘ"
Artix = "≤░μΘ"
CentOS = "ΎΝΕ"
Debian = "≤░μγ"
EndeavourOS = "ΎΗΩ"
Fedora = "≤░μδ"
Gentoo = "≤░μρ"
Linux = "ΎΝξ"
Macos = "≤░Α╡"
Manjaro = "ΎΝΤ"
Mint = "≤░μφ"
NixOS = "≤▒ΕΖ"
Pop = "ΎΝς"
Raspbian = "≤░Ρ┐"
RedHatEnterprise = "≤▒Εδ"
Redhat = "≤▒Εδ"
SUSE = "ΎΝΦ"
Ubuntu = "≤░ΧΙ"
Windows = "≤░Ξ▓"

[php]
format = "┬╖[ $symbol( $version) ]($style)"
style = "fg:blue"
symbol = "ΌαΙ"

[pixi]
format = "┬╖[ ($version)]($style)"
style = "fg:bright-black"

[python]
format = "┬╖[ $symbol( $version) ]($style)"
style = "fg:blue"
symbol = "ΌαΗ"

[rust]
format = "┬╖[ $symbol( $version) ]($style)"
style = "fg:blue"
symbol = "Όηρ"

[time]
disabled = false
format = "┬╖[ ΎΡ║ $time ]($style)"
style = "fg:bright-black"
time_format = "%R"

[username]
format = "[$user ]($style)"
show_always = true
style_root = "fg:green"
style_user = "fg:green"
