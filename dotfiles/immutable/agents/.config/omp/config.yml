  fallbackChains: 
    slow: 
      - xiaomi/mimo-v2.5-pro
      - deepseek/deepseek-v4-pro
    default: 
      - deepseek/deepseek-v4-pro
      - xiaomi/mimo-v2.5-pro
      - zai/GLM-4.7
defaultThinkingLevel: high
theme: 
  dark: titanium
  light: light-cirrus
statusLine: 
  preset: default
  separator: powerline-thin
  transparent: true
  compactThinkingLevel: true
showHardwareCursor: false
images: 
  blockImages: false
startup: 
  quiet: true
tools: 
  approvalMode: yolo
memory: 
  backend: hindsight
providers: 
  webSearch: auto
symbolPreset: nerd
setupVersion: 1
terminal: 
  showProgress: false
tui: 
  scrollbackRebuild: true
  imeSafeCursor: true
display: 
  showTokenUsage: true
  cacheMissMarker: true
advisor: 
  enabled: true
  subagents: false
prewalk: 
  enabled: true