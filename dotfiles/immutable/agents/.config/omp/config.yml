modelRoles: 
  default: zhipu-coding-plan/glm-5.2
  slow: zai/GLM-5.2
  pro: qwen/qwen3.8-max-preview
  smol: deepseek/deepseek-v4-flash
  vision: xiaomi/mimo-v2.5
  plan: zhipu-coding-plan/glm-5.2
