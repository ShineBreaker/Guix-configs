#
# 禁用 WirePlumber 的"自动静音"特性。
#
# 背景：脚本 device/automute-alsa-routes.lua 会在某条 ALSA 输出 route
# 被移除时，把所有其他可用的 ALSA 输出 route 都静音。在内置 Speaker
# 这类 route 上常常误伤，持久化到 ~/.local/state/wireplumber/ 后下次
# 启动就一直是 muted，导致"音频突然没了"的现象。
#
# 两个 setting 都是 bool，默认 false；这里显式置 false 防止上游变更。

wireplumber.profiles = {
    main = {
        wireplumber.settings = {
            ["device.routes.mute-on-alsa-playback-removed"] = false
            ["device.routes.mute-on-bluetooth-playback-removed"] = false
        }
    }
}
